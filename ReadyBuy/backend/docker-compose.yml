version: "3.9"

services:

  backend:
    build: .

    container_name: readybuy-backend

    ports:
      - "5001:5001"

    env_file:
      - ./.env

    depends_on:
      - mongodb
      - redis
      - rabbitmq

  frontend:
    build: .././frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

  mongodb:
    image: mongo:8

    container_name: readybuy-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7

    container_name: readybuy-redis

    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:management

    container_name: readybuy-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  mongo_data:
